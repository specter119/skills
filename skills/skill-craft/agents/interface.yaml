interface:
  display_name: "Skill Craft"
  short_description: "Create, refactor, evaluate, and package agent skills"
  default_prompt: "Use skill-craft to turn my workflow or notes into a reusable skill with lean structure, clear triggering, and the right evals."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
